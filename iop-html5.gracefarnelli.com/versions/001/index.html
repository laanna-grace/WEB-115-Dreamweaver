<!DOCTYPE html>
<!-- 
    Declares this document as HTML5.
    This tells the browser how to interpret the code.
-->

<html lang="en">
<!-- 
    Root element of the page.
    lang="en" helps with accessibility and search engines by declaring the language.
-->

<head>
<!-- Contains metadata (data about the page, not visible content) -->

<meta charset="utf-8">
<!-- 
        Sets character encoding to UTF-8.
        This ensures text displays correctly (supports most languages and symbols).
    -->

<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- 
        Makes the page responsive.
        Ensures proper scaling on mobile devices.
    -->

<title>inside out - HTML5 App</title>
<!-- 
        Title shown in the browser tab.
    -->

</head>

<body>
<!-- 
    Contains all visible content of the webpage.
--> 

<!-- ================= HEADER ================= -->
<header> 
  <!-- 
            header = semantic tag for top section (logo/nav)
        -->
  
  <div> 
    <!-- 
                container: centers content and adds horizontal spacing
            -->
    
    <h1>inside out</h1>
    <!-- 
                h1: main heading of the page
            -->
    
    <nav aria-label="Main navigation"> 
      <!-- 
                    nav: semantic element for navigation links
                --> 
      
      <a href="#">Lorem</a> 
      <!-- 
                    anchor tag = hyperlink
                    href="#": placeholder link (doesn't navigate anywhere)
                --> 
      
      <a href="#">Ipsum</a> <a href="#">Dolor</a> 
	  </nav>
  </div>
</header>

<!-- ================= MAIN CONTENT ================= -->
<main> 
  <!-- 
            main: semantic tag for main page content
        -->
  <section>
    <div> 
      <!-- keeps content centered and readable -->
      
      <h1>White Panel</h1>
      <!-- section heading -->
      
      <p>Lorem ipsum.</p>
      <!-- paragraph text --> 
    </div>
  </section>
  <section>
    <div>
      <h1>Blue Panel</h1>
      <p>Lorem ipsum.</p>
    </div>
  </section>
</main>

<!-- ================= FOOTER ================= -->
<footer>
  <div>
    <p>Footer Information</p>
  </div>
</footer>
</body>
</html>
